<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Days Worked</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  :root{
    --bg: #17171a;
    --panel: #202024;
    --panel-raised: #26262b;
    --border: #38383d;
    --text: #f2efe9;
    --text-muted: #8b8b90;
    --full: #e8b84b;
    --full-dim: #4a3f22;
    --half: #6fa0c9;
    --half-dim: #23384a;
    --quarter: #c97c4b;
    --quarter-dim: #3f2a1c;
    --danger: #c96b6b;
    --danger-dim: #3f2323;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }

  #root {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 48px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.06em;
    font-size: 20px;
    text-transform: uppercase;
  }
  .brand .dot { color: var(--full); }
  .header-icons { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
  }
  .icon-btn:active { background: var(--panel-raised); }

  /* Contract pills */
  .pill-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 14px;
    scrollbar-width: none;
  }
  .pill-row::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .pill.active { background: var(--full); color: #1a1408; border-color: var(--full); }
  .pill.add { color: var(--full); border-style: dashed; }

  .combined-line {
    font-size: 11px; color: var(--text-muted); margin: -6px 0 14px 2px;
  }
  .combined-line b { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  /* Nudge banner */
  .nudge {
    background: var(--half-dim);
    border: 1px solid var(--half);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
  }
  .nudge-text { color: var(--text); flex: 1; }
  .nudge-actions { display: flex; gap: 6px; }
  .nudge-btn {
    background: var(--half);
    color: #0d1c28;
    border: none;
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .nudge-x {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 2px 6px;
  }

  /* Today card */
  .today-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .today-card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .today-label {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .today-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }

  /* Stat panel */
  .stat-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 16px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }
  .stat-panel::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--full);
  }
  .stat-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .stat-main {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 34px;
    line-height: 1;
  }
  .stat-main .of {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .stat-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .stat-sub {
    text-align: right;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .stat-sub b { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .progress-track {
    margin-top: 14px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--full), #f2cd6e);
    border-radius: 3px;
    transition: width .3s ease;
  }
  .progress-fill.over { background: linear-gradient(90deg, var(--danger), #e08a8a); }

  .pace-line {
    margin-top: 10px;
    font-size: 12px;
    color: var(--text-muted);
  }
  .pace-line b { color: var(--half); font-weight: 600; }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin: 22px 0 2px;
  }
  .month-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer; padding: 4px 10px;
  }
  .nav-btn:active { color: var(--text); }
  .year-jump-row {
    display: flex; justify-content: center; gap: 18px; margin-bottom: 10px;
  }
  .year-jump-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; padding: 2px 8px; cursor: pointer;
  }

  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekday-row span {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: transform .08s ease;
    touch-action: manipulation;
  }
  .cell.empty-cell { visibility: hidden; }
  .cell.today { box-shadow: inset 0 0 0 1.5px var(--text); }
  .cell:active { transform: scale(0.9); }

  .cell.full { background: var(--full); color: #1a1408; border-color: var(--full); font-weight: 700; }
  .cell.half { background: var(--half-dim); color: var(--half); border-color: var(--half); }
  .cell.half::after {
    content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
    background: var(--half); border-radius: 0 7px 7px 0; z-index: -1;
  }
  .cell.quarter { background: var(--quarter-dim); color: var(--quarter); border-color: var(--quarter); }
  .cell.quarter::after {
    content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 25%;
    background: var(--quarter); border-radius: 0 7px 7px 0; z-index: -1;
  }
  .cell.future { opacity: 0.45; }
  .cell.locked {
    cursor: default;
    opacity: 0.35;
    background: repeating-linear-gradient(45deg, var(--panel), var(--panel) 4px, var(--panel-raised) 4px, var(--panel-raised) 8px);
  }
  .cell .note-dot {
    position: absolute; top: 3px; right: 3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: currentColor; opacity: 0.7;
  }

  .legend {
    display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .hint {
    text-align: center; font-size: 11px; color: var(--text-muted);
    margin-top: 18px; line-height: 1.6;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px;
    padding: 24px 20px 28px;
    animation: slideup .25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  @keyframes slideup { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 18px;
    margin: 0 0 4px;
  }
  .modal h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 14px;
    margin: 0 0 8px;
    color: var(--text-muted);
  }
  .modal p.desc { color: var(--text-muted); font-size: 12px; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 12px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
  }
  .field textarea { font-family: 'Inter', sans-serif; font-size: 14px; resize: vertical; min-height: 60px; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--full); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 10px; border: none;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer;
  }
  .btn-primary { background: var(--full); color: #1a1408; }
  .btn-primary:active { background: #d1a53f; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .day-detail { display: flex; gap: 8px; margin-top: 4px; margin-bottom: 14px; }
  .day-detail button {
    flex: 1; padding: 12px 4px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .day-detail button.active-full { background: var(--full); color: #1a1408; border-color: var(--full); }
  .day-detail button.active-half { background: var(--half); color: #0d1c28; border-color: var(--half); }
  .day-detail button.active-quarter { background: var(--quarter); color: #241408; border-color: var(--quarter); }

  .earnings-panel {
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);
  }
  .earnings-panel b { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-year { font-family: 'Oswald', sans-serif; font-size: 16px; letter-spacing: 0.02em; }
  .summary-stats { text-align: right; font-size: 12px; color: var(--text-muted); }
  .summary-stats b { color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .summary-stats.over b { color: var(--danger); }
  .summary-contract-block { margin-bottom: 18px; }

  .data-actions { display: flex; gap: 10px; }
  .data-actions .btn { font-size: 13px; padding: 11px; }

  .manage-contract-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
  }
  .manage-contract-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px;
  }
  .manage-contract-row button {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); padding: 9px 10px; font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .manage-contract-row.archived input { opacity: 0.5; }

  .notes-list-item {
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .notes-list-item:last-child { border-bottom: none; }
  .notes-list-date {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }
  .notes-list-text { font-size: 13px; margin-top: 3px; }
  .notes-empty { font-size: 12px; color: var(--text-muted); padding: 8px 0; }

  .loading-msg { text-align: center; color: var(--text-muted); padding: 60px 0; font-size: 13px; }
  .storage-warning {
    background: var(--danger-dim); border: 1px solid var(--danger);
    border-radius: 10px; padding: 12px 14px; font-size: 12px; margin-bottom: 14px; line-height: 1.5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS = ['S','M','T','W','T','F','S'];
const STATUS_CYCLE = [null, 'full', 'half', 'quarter'];
const STATUS_VALUE = { full: 1, half: 0.5, quarter: 0.25 };
const STORAGE_KEY = 'daysWorkedTrackerData';
const LONG_PRESS_MS = 450;
const DEFAULT_CONTRACT_ID = 'main';

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isoOf(year, month, day) {
  return year + '-' + String(month+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
}
function addDaysISO(iso, delta) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d + delta);
  return isoOf(dt.getFullYear(), dt.getMonth(), dt.getDate());
}
function friendlyDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function makeId() {
  return 'c_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function storageAvailable() {
  try {
    const k = '__tracker_test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (e) {
    return false;
  }
}

function loadData() {
  const empty = { contracts: {}, yearSettings: {}, entries: {}, adjustments: {}, lastActiveContract: null };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return empty;
    const parsed = JSON.parse(raw);

    // v4 shape: has adjustments
    if (parsed.contracts && parsed.adjustments) {
      return {
        contracts: parsed.contracts || {},
        yearSettings: parsed.yearSettings || {},
        entries: parsed.entries || {},
        adjustments: parsed.adjustments || {},
        lastActiveContract: parsed.lastActiveContract || Object.keys(parsed.contracts || {})[0] || null
      };
    }
    // v3 shape: multi-contract, no adjustments yet
    if (parsed.contracts) {
      return {
        contracts: parsed.contracts || {},
        yearSettings: parsed.yearSettings || {},
        entries: parsed.entries || {},
        adjustments: {},
        lastActiveContract: parsed.lastActiveContract || Object.keys(parsed.contracts || {})[0] || null
      };
    }
    // v2 shape: flat yearSettings + entries, no contracts -> wrap as single "Main" contract
    if (parsed.yearSettings || parsed.entries) {
      const hasAny = (parsed.yearSettings && Object.keys(parsed.yearSettings).length) || (parsed.entries && Object.keys(parsed.entries).length);
      if (!hasAny) return empty;
      return {
        contracts: { [DEFAULT_CONTRACT_ID]: { name: 'Main Tour', archived: false } },
        yearSettings: { [DEFAULT_CONTRACT_ID]: parsed.yearSettings || {} },
        entries: { [DEFAULT_CONTRACT_ID]: parsed.entries || {} },
        adjustments: {},
        lastActiveContract: DEFAULT_CONTRACT_ID
      };
    }
    // v1 shape: single flat settings object
    if (parsed.settings && parsed.settings.contractDays != null) {
      return {
        contracts: { [DEFAULT_CONTRACT_ID]: { name: 'Main Tour', archived: false } },
        yearSettings: { [DEFAULT_CONTRACT_ID]: { [new Date().getFullYear()]: parsed.settings } },
        entries: { [DEFAULT_CONTRACT_ID]: parsed.entries || {} },
        adjustments: {},
        lastActiveContract: DEFAULT_CONTRACT_ID
      };
    }
    return empty;
  } catch (e) {
    return empty;
  }
}
function saveData(contracts, yearSettings, entries, lastActiveContract, adjustments) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ contracts, yearSettings, entries, lastActiveContract, adjustments }));
    return true;
  } catch (e) {
    return false;
  }
}
function effectiveSettingsFor(yearSettingsForContract, year) {
  if (!yearSettingsForContract) return null;
  if (yearSettingsForContract[year]) return { data: yearSettingsForContract[year], sourceYear: year };
  const configuredYears = Object.keys(yearSettingsForContract).map(Number);
  if (!configuredYears.length) return null;
  const priorYears = configuredYears.filter(y => y <= year).sort((a,b) => b - a);
  if (priorYears.length) return { data: yearSettingsForContract[priorYears[0]], sourceYear: priorYears[0] };
  const nextYears = configuredYears.sort((a,b) => a - b);
  return { data: yearSettingsForContract[nextYears[0]], sourceYear: nextYears[0] };
}

function App() {
  const hasStorage = useMemo(() => storageAvailable(), []);
  const initial = useMemo(() => hasStorage ? loadData() : { contracts: {}, yearSettings: {}, entries: {}, adjustments: {}, lastActiveContract: null }, [hasStorage]);

  const [contracts, setContracts] = useState(initial.contracts);
  const [yearSettings, setYearSettings] = useState(initial.yearSettings);
  const [entries, setEntries] = useState(initial.entries);
  const [adjustments, setAdjustments] = useState(initial.adjustments);
  const [activeContractId, setActiveContractId] = useState(initial.lastActiveContract);

  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth());
  const [showSettings, setShowSettings] = useState(false);
  const [editingSettingsYear, setEditingSettingsYear] = useState(new Date().getFullYear());
  const [showSummary, setShowSummary] = useState(false);
  const [showAddContract, setShowAddContract] = useState(false);
  const [showAdjustments, setShowAdjustments] = useState(false);
  const [newContractName, setNewContractName] = useState('');
  const [dayDetailIso, setDayDetailIso] = useState(null);
  const [nudgeDismissed, setNudgeDismissed] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState({ contractDays: '245', annualSalary: '', otMultiplier: '1', startingBalance: '', startingBalanceDate: '' });
  const fileInputRef = useRef(null);
  const pressState = useRef({});

  const persist = useCallback((nc, nys, ne, nActive, nAdj) => {
    saveData(nc, nys, ne, nActive, nAdj);
  }, []);

  const activeContractEntries = entries[activeContractId] || {};
  const activeContractYearSettings = yearSettings[activeContractId] || {};
  const activeContractAdjustments = (adjustments[activeContractId] && adjustments[activeContractId][viewYear]) || [];

  const updateEntry = (iso, patch) => {
    setEntries(prev => {
      const contractEntries = { ...(prev[activeContractId] || {}) };
      const existing = contractEntries[iso] || {};
      const merged = { ...existing, ...patch };
      if (!merged.status) {
        delete contractEntries[iso];
      } else {
        contractEntries[iso] = merged;
      }
      const updated = { ...prev, [activeContractId]: contractEntries };
      persist(contracts, yearSettings, updated, activeContractId, adjustments);
      return updated;
    });
  };

  const cycleDay = (iso) => {
    const current = activeContractEntries[iso]?.status || null;
    const idx = STATUS_CYCLE.indexOf(current);
    const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
    updateEntry(iso, { status: next });
  };
  const setDayStatus = (iso, status) => updateEntry(iso, { status });
  const setDayNote = (iso, note) => updateEntry(iso, { note });

  const switchContract = (id) => {
    setActiveContractId(id);
    persist(contracts, yearSettings, entries, id, adjustments);
  };

  const createContract = () => {
    const name = newContractName.trim() || ('Contract ' + (Object.keys(contracts).length + 1));
    const id = makeId();
    const nextContracts = { ...contracts, [id]: { name, archived: false } };
    setContracts(nextContracts);
    setActiveContractId(id);
    persist(nextContracts, yearSettings, entries, id, adjustments);
    setShowAddContract(false);
    setNewContractName('');
    openSettingsFor(viewYear, id);
  };

  const renameContract = (id, name) => {
    const nextContracts = { ...contracts, [id]: { ...contracts[id], name } };
    setContracts(nextContracts);
    persist(nextContracts, yearSettings, entries, activeContractId, adjustments);
  };

  const toggleArchiveContract = (id) => {
    const nextContracts = { ...contracts, [id]: { ...contracts[id], archived: !contracts[id].archived } };
    setContracts(nextContracts);
    persist(nextContracts, yearSettings, entries, activeContractId, adjustments);
  };

  const openSettingsFor = (year, contractIdOverride) => {
    const cId = contractIdOverride || activeContractId;
    setEditingSettingsYear(year);
    const eff = effectiveSettingsFor(yearSettings[cId], year);
    setSettingsDraft({
      contractDays: String(eff?.data?.contractDays ?? 245),
      annualSalary: eff?.data?.annualSalary != null ? String(eff.data.annualSalary) : '',
      otMultiplier: String(eff?.data?.otMultiplier ?? 1),
      startingBalance: yearSettings[cId]?.[year]?.startingBalance != null ? String(yearSettings[cId][year].startingBalance) : '',
      startingBalanceDate: yearSettings[cId]?.[year]?.startingBalanceDate || ''
    });
    setShowSettings(true);
  };

  const saveSettings = () => {
    const cd = parseFloat(settingsDraft.contractDays) || 245;
    const sal = settingsDraft.annualSalary.trim() === '' ? null : parseFloat(settingsDraft.annualSalary);
    const ot = parseFloat(settingsDraft.otMultiplier) || 1;
    const bal = settingsDraft.startingBalance.trim() === '' ? 0 : (parseFloat(settingsDraft.startingBalance) || 0);
    const balDate = settingsDraft.startingBalanceDate || null;
    const contractYears = { ...(yearSettings[activeContractId] || {}) };
    contractYears[editingSettingsYear] = { contractDays: cd, annualSalary: sal, otMultiplier: ot, startingBalance: bal, startingBalanceDate: balDate };
    const next = { ...yearSettings, [activeContractId]: contractYears };
    setYearSettings(next);
    persist(contracts, next, entries, activeContractId, adjustments);
    setShowSettings(false);
  };

  const [newAdjAmount, setNewAdjAmount] = useState('');
  const [newAdjNote, setNewAdjNote] = useState('');

  const addAdjustment = () => {
    const amt = parseFloat(newAdjAmount);
    if (!amt) return;
    const yearList = [...((adjustments[activeContractId] && adjustments[activeContractId][viewYear]) || [])];
    yearList.push({ id: makeId(), amount: amt, note: newAdjNote.trim() });
    const nextContractAdj = { ...(adjustments[activeContractId] || {}), [viewYear]: yearList };
    const next = { ...adjustments, [activeContractId]: nextContractAdj };
    setAdjustments(next);
    persist(contracts, yearSettings, entries, activeContractId, next);
    setNewAdjAmount('');
    setNewAdjNote('');
  };

  const removeAdjustment = (id) => {
    const yearList = ((adjustments[activeContractId] && adjustments[activeContractId][viewYear]) || []).filter(a => a.id !== id);
    const nextContractAdj = { ...(adjustments[activeContractId] || {}), [viewYear]: yearList };
    const next = { ...adjustments, [activeContractId]: nextContractAdj };
    setAdjustments(next);
    persist(contracts, yearSettings, entries, activeContractId, next);
  };

  const exportData = () => {
    const payload = JSON.stringify({ contracts, yearSettings, entries, adjustments, lastActiveContract: activeContractId }, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'days-worked-backup-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const nextContracts = parsed.contracts || {};
        const nextYearSettings = parsed.yearSettings || {};
        const nextEntries = parsed.entries || {};
        const nextAdjustments = parsed.adjustments || {};
        const nextActive = parsed.lastActiveContract || Object.keys(nextContracts)[0] || null;
        setContracts(nextContracts);
        setYearSettings(nextYearSettings);
        setEntries(nextEntries);
        setAdjustments(nextAdjustments);
        setActiveContractId(nextActive);
        persist(nextContracts, nextYearSettings, nextEntries, nextActive, nextAdjustments);
        alert('Backup imported.');
      } catch (err) {
        alert('That file could not be read as a backup.');
      }
    };
    reader.readAsText(file);
  };

  const effSettings = useMemo(() => effectiveSettingsFor(activeContractYearSettings, viewYear), [activeContractYearSettings, viewYear]);
  const contractDays = effSettings ? effSettings.data.contractDays : 245;
  const usingFallbackYear = effSettings && effSettings.sourceYear !== viewYear ? effSettings.sourceYear : null;
  const startingBalance = activeContractYearSettings[viewYear]?.startingBalance || 0;
  const startingBalanceDate = activeContractYearSettings[viewYear]?.startingBalanceDate || null;

  const adjustmentTotal = activeContractAdjustments.reduce((sum, a) => sum + a.amount, 0);

  const totals = useMemo(() => {
    let total = startingBalance + adjustmentTotal;
    let ytdThroughToday = startingBalance + adjustmentTotal;
    const today = todayISO();
    const viewedYearPrefix = viewYear + '-';
    Object.entries(activeContractEntries).forEach(([iso, e]) => {
      if (startingBalanceDate && iso <= startingBalanceDate) return; // already covered by the lump-sum balance
      const v = STATUS_VALUE[e.status] || 0;
      if (iso.startsWith(viewedYearPrefix)) {
        total += v;
        if (iso <= today) ytdThroughToday += v;
      }
    });
    return { total, ytdThroughToday };
  }, [activeContractEntries, viewYear, startingBalance, startingBalanceDate, adjustmentTotal]);

  const remaining = Math.max(0, contractDays - totals.total);
  const isOver = totals.total >= contractDays;
  const pct = Math.min(100, (totals.total / contractDays) * 100);

  const pace = useMemo(() => {
    const now = new Date();
    if (now.getFullYear() !== viewYear) return null;
    const startOfYear = new Date(now.getFullYear(), 0, 1);
    const dayOfYear = Math.floor((now - startOfYear) / 86400000) + 1;
    if (totals.ytdThroughToday <= 0 || dayOfYear <= 0) return null;
    const rate = totals.ytdThroughToday / dayOfYear;
    if (rate <= 0) return null;
    const daysNeeded = contractDays - totals.ytdThroughToday;
    if (daysNeeded <= 0) return { hit: true };
    const calendarDaysToGo = daysNeeded / rate;
    const projected = new Date(now.getTime() + calendarDaysToGo * 86400000);
    return { hit: false, date: projected };
  }, [totals, contractDays, viewYear]);

  const dayRate = effSettings && effSettings.data.annualSalary ? effSettings.data.annualSalary / contractDays : null;
  const extraDays = Math.max(0, totals.total - contractDays);
  const otMultiplier = effSettings?.data?.otMultiplier || 1;
  const extraPay = dayRate ? extraDays * dayRate * otMultiplier : null;

  // Combined total across ALL contracts (active + archived) for the viewed year — this is what "stacking" looks like
  const combinedTotal = useMemo(() => {
    let sum = 0;
    Object.keys(contracts).forEach(cId => {
      if (contracts[cId].archived) return;
      const cEntries = entries[cId] || {};
      const cYearSettings = yearSettings[cId] || {};
      const cAdj = ((adjustments[cId] && adjustments[cId][viewYear]) || []).reduce((s, a) => s + a.amount, 0);
      let t = (cYearSettings[viewYear]?.startingBalance || 0) + cAdj;
      const balDate = cYearSettings[viewYear]?.startingBalanceDate || null;
      Object.entries(cEntries).forEach(([iso, e]) => {
        if (balDate && iso <= balDate) return;
        if (iso.startsWith(viewYear + '-')) t += STATUS_VALUE[e.status] || 0;
      });
      sum += t;
    });
    return sum;
  }, [contracts, entries, yearSettings, adjustments, viewYear]);

  const contractList = Object.entries(contracts).map(([id, c]) => ({ id, ...c }));
  const visibleContracts = contractList.filter(c => !c.archived);

  const yearSummaries = useMemo(() => {
    return contractList.map(c => {
      const cEntries = entries[c.id] || {};
      const cYearSettings = yearSettings[c.id] || {};
      const cAdjByYear = adjustments[c.id] || {};
      const years = new Set([new Date().getFullYear()]);
      Object.keys(cEntries).forEach(iso => years.add(parseInt(iso.slice(0,4), 10)));
      Object.keys(cYearSettings).forEach(y => years.add(parseInt(y, 10)));
      Object.keys(cAdjByYear).forEach(y => years.add(parseInt(y, 10)));
      const rows = Array.from(years).sort((a,b) => b - a).map(y => {
        const yAdj = (cAdjByYear[y] || []).reduce((s, a) => s + a.amount, 0);
        let t = (cYearSettings[y]?.startingBalance || 0) + yAdj;
        const balDate = cYearSettings[y]?.startingBalanceDate || null;
        Object.entries(cEntries).forEach(([iso, e]) => {
          if (balDate && iso <= balDate) return;
          if (iso.startsWith(y + '-')) t += STATUS_VALUE[e.status] || 0;
        });
        const eff = effectiveSettingsFor(cYearSettings, y);
        const cd = eff ? eff.data.contractDays : 245;
        return { year: y, total: t, contractDays: cd, over: t >= cd };
      });
      return { contractId: c.id, name: c.name, archived: c.archived, rows };
    });
  }, [contractList, entries, yearSettings, adjustments]);

  const notesForYear = useMemo(() => {
    const list = [];
    Object.entries(activeContractEntries).forEach(([iso, e]) => {
      if (e.note && iso.startsWith(viewYear + '-')) list.push({ iso, note: e.note, status: e.status });
    });
    return list.sort((a,b) => a.iso.localeCompare(b.iso));
  }, [activeContractEntries, viewYear]);

  const todayIso = todayISO();
  const yesterdayIso = addDaysISO(todayIso, -1);
  const showNudge = !nudgeDismissed && activeContractId && !activeContractEntries[yesterdayIso] && effSettings;

  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const changeMonth = (delta) => {
    let m = viewMonth + delta;
    let y = viewYear;
    if (m < 0) { m = 11; y -= 1; }
    if (m > 11) { m = 0; y += 1; }
    setViewMonth(m);
    setViewYear(y);
  };
  const changeYear = (delta) => setViewYear(y => y + delta);

  const handlePressStart = (iso) => () => {
    pressState.current[iso] = Date.now();
  };
  const handlePressEnd = (iso) => (e) => {
    e.preventDefault();
    const start = pressState.current[iso];
    if (!start) return;
    const elapsed = Date.now() - start;
    delete pressState.current[iso];
    if (elapsed >= LONG_PRESS_MS) {
      setDayDetailIso(iso);
    } else {
      cycleDay(iso);
    }
  };

  const needsSetup = visibleContracts.length === 0;
  const detailEntry = dayDetailIso ? (activeContractEntries[dayDetailIso] || {}) : null;
  const [detailNoteDraft, setDetailNoteDraft] = useState('');
  useEffect(() => { if (dayDetailIso) setDetailNoteDraft(activeContractEntries[dayDetailIso]?.note || ''); }, [dayDetailIso]);

  const [todayNoteDraft, setTodayNoteDraft] = useState('');
  useEffect(() => { setTodayNoteDraft(activeContractEntries[todayIso]?.note || ''); }, [entries, activeContractId, todayIso]);

  return (
    <div className="wrap">
      <div className="header">
        <div className="brand">Days<span className="dot">·</span>Worked</div>
        <div className="header-icons">
          <div className="icon-btn" onClick={() => setShowSummary(true)} title="Year summary">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <line x1="18" y1="20" x2="18" y2="10"></line>
              <line x1="12" y1="20" x2="12" y2="4"></line>
              <line x1="6" y1="20" x2="6" y2="14"></line>
            </svg>
          </div>
          {!needsSetup && (
            <div className="icon-btn" onClick={() => openSettingsFor(viewYear)} title="Settings">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06A1.65 1.65 0 004.6 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06A1.65 1.65 0 009 4.6a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06A1.65 1.65 0 0019.4 9c.11.35.31.66.6.87"></path>
              </svg>
            </div>
          )}
        </div>
      </div>

      {!hasStorage && (
        <div className="storage-warning">
          This browser is blocking local storage (common in in-app preview windows), so entries won't be saved here. Open this file directly in Safari to store data properly.
        </div>
      )}

      {!needsSetup && (
        <React.Fragment>
          <div className="pill-row">
            {visibleContracts.map(c => (
              <div key={c.id} className={"pill" + (c.id === activeContractId ? " active" : "")} onClick={() => switchContract(c.id)}>
                {c.name}
              </div>
            ))}
            <div className="pill add" onClick={() => setShowAddContract(true)}>+ Add contract</div>
          </div>
          {visibleContracts.length > 1 && (
            <div className="combined-line">Combined across all contracts this year: <b>{combinedTotal.toFixed(1)}</b> days</div>
          )}
        </React.Fragment>
      )}

      {showNudge && (
        <div className="nudge">
          <div className="nudge-text">You haven't logged {friendlyDate(yesterdayIso)}</div>
          <div className="nudge-actions">
            <button className="nudge-btn" onClick={() => setDayStatus(yesterdayIso, 'full')}>Mark full</button>
            <button className="nudge-x" onClick={() => setNudgeDismissed(true)}>✕</button>
          </div>
        </div>
      )}

      {!needsSetup && (
        <div className="today-card">
          <div className="today-card-head">
            <span className="today-label">Log today</span>
            <span className="today-date">{friendlyDate(todayIso)}</span>
          </div>
          <div className="day-detail">
            <button className={activeContractEntries[todayIso]?.status === 'full' ? 'active-full' : ''} onClick={() => setDayStatus(todayIso, activeContractEntries[todayIso]?.status === 'full' ? null : 'full')}>Full</button>
            <button className={activeContractEntries[todayIso]?.status === 'half' ? 'active-half' : ''} onClick={() => setDayStatus(todayIso, activeContractEntries[todayIso]?.status === 'half' ? null : 'half')}>Half</button>
            <button className={activeContractEntries[todayIso]?.status === 'quarter' ? 'active-quarter' : ''} onClick={() => setDayStatus(todayIso, activeContractEntries[todayIso]?.status === 'quarter' ? null : 'quarter')}>Quarter</button>
          </div>
          <input
            type="text"
            placeholder="Note (optional) — e.g. load-in, city, leg"
            value={todayNoteDraft}
            onChange={(e) => setTodayNoteDraft(e.target.value)}
            onBlur={() => setDayNote(todayIso, todayNoteDraft)}
            style={{ width: '100%', background: 'var(--bg)', border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', color: 'var(--text)', fontFamily: 'Inter, sans-serif', fontSize: 13 }}
          />
        </div>
      )}

      {!needsSetup && (
        <div className="stat-panel">
          <div className="stat-row">
            <div>
              <div className="stat-main">{totals.total.toFixed(1)} <span className="of">/ {contractDays}</span></div>
              <div className="stat-label">{contracts[activeContractId]?.name} · {viewYear === new Date().getFullYear() ? 'this year' : viewYear}</div>
              {usingFallbackYear && (
                <div className="stat-label" style={{marginTop: 2, color: 'var(--half)'}}>Using {usingFallbackYear} rates — tap ⚙ to set {viewYear}'s</div>
              )}
            </div>
            <div className="stat-sub">
              {isOver
                ? <div>Over by <b>{(totals.total - contractDays).toFixed(1)}</b></div>
                : <div><b>{remaining.toFixed(1)}</b> to go</div>}
            </div>
          </div>
          <div className="progress-track">
            <div className={"progress-fill" + (isOver ? " over" : "")} style={{ width: pct + '%' }}></div>
          </div>
          {pace && !pace.hit && (
            <div className="pace-line">At your current pace, you'd hit {contractDays} around <b>{pace.date.toLocaleDateString('en-US', { month: 'long', day: 'numeric' })}</b></div>
          )}
          {pace && pace.hit && (
            <div className="pace-line">You've already reached your <b>{contractDays}</b>-day threshold this year.</div>
          )}
          {dayRate && (
            <div className="earnings-panel">
              <span>Day rate</span><b>${dayRate.toFixed(0)}</b>
            </div>
          )}
          {dayRate && extraDays > 0 && (
            <div className="earnings-panel">
              <span>Extra pay ({extraDays.toFixed(1)} days{otMultiplier !== 1 ? ' @ ' + otMultiplier + 'x' : ''})</span><b>${extraPay.toFixed(0)}</b>
            </div>
          )}
          {activeContractAdjustments.length > 0 && (
            <div className="earnings-panel" onClick={() => setShowAdjustments(true)} style={{cursor: 'pointer'}}>
              <span>Includes employer adjustment</span><b>{adjustmentTotal > 0 ? '+' : ''}{adjustmentTotal.toFixed(1)}</b>
            </div>
          )}
          <div className="earnings-panel" onClick={() => setShowAdjustments(true)} style={{cursor: 'pointer', color: 'var(--half)'}}>
            <span>{activeContractAdjustments.length > 0 ? 'Manage adjustments' : '+ Add employer adjustment'}</span><b>›</b>
          </div>
        </div>
      )}

      {needsSetup && (
        <div className="stat-panel">
          <div className="stat-label" style={{marginBottom: 8}}>Set up your tracker</div>
          <div style={{fontSize: 13, color: 'var(--text-muted)', marginBottom: 12}}>Create your first contract to start logging days.</div>
          <button className="btn btn-primary" onClick={() => setShowAddContract(true)}>Get started</button>
        </div>
      )}

      {!needsSetup && (
      <React.Fragment>
      <div className="month-nav">
        <button className="nav-btn" onClick={() => changeMonth(-1)}>‹</button>
        <div className="month-title" onClick={() => { setViewYear(new Date().getFullYear()); setViewMonth(new Date().getMonth()); }} style={{cursor:'pointer'}} title="Tap to jump to today">
          {MONTH_NAMES[viewMonth]} {viewYear}
        </div>
        <button className="nav-btn" onClick={() => changeMonth(1)}>›</button>
      </div>
      <div className="year-jump-row">
        <button className="year-jump-btn" onClick={() => changeYear(-1)}>« {viewYear - 1}</button>
        <button className="year-jump-btn" onClick={() => changeYear(1)}>{viewYear + 1} »</button>
      </div>

      <div className="weekday-row">
        {WEEKDAYS.map((w, i) => <span key={i}>{w}</span>)}
      </div>

      <div className="cal-grid">
        {cells.map((d, i) => {
          if (d === null) return <div key={i} className="cell empty-cell"></div>;
          const iso = isoOf(viewYear, viewMonth, d);
          const entry = activeContractEntries[iso];
          const status = entry?.status;
          const isToday = iso === todayIso;
          const isFuture = iso > todayIso;
          const isLocked = startingBalanceDate && iso <= startingBalanceDate;
          const cls = ['cell'];
          if (status && !isLocked) cls.push(status);
          if (isToday) cls.push('today');
          if (isFuture && !status) cls.push('future');
          if (isLocked) cls.push('locked');
          return (
            <div
              key={i}
              className={cls.join(' ')}
              title={isLocked ? 'Covered by your starting balance' : undefined}
              onMouseDown={isLocked ? undefined : handlePressStart(iso)}
              onMouseUp={isLocked ? undefined : handlePressEnd(iso)}
              onTouchStart={isLocked ? undefined : handlePressStart(iso)}
              onTouchEnd={isLocked ? undefined : handlePressEnd(iso)}
            >
              {d}
              {entry?.note && !isLocked && <span className="note-dot"></span>}
            </div>
          );
        })}
      </div>
      {startingBalanceDate && (
        <div className="hint" style={{marginTop: 8}}>Dates through {friendlyDate(startingBalanceDate)} are covered by your starting balance and locked.</div>
      )}

      <div className="legend">
        <span><span className="swatch" style={{background: 'var(--full)'}}></span>Full</span>
        <span><span className="swatch" style={{background: 'var(--half)'}}></span>Half</span>
        <span><span className="swatch" style={{background: 'var(--quarter)'}}></span>Quarter</span>
      </div>

      <div className="hint">Tap to cycle Full → Half → Quarter → clear.<br/>Hold a date to add a note. Switch contracts with the pills above to log stacked days. Data stays on this device only.</div>
      </React.Fragment>
      )}

      {showAddContract && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setShowAddContract(false); }}>
          <div className="modal">
            <h2>New contract</h2>
            <p className="desc">e.g. "Arirang — Main Tour" or "Retainer — Tour B". You'll set its contract days and salary next.</p>
            <div className="field">
              <label>Name</label>
              <input type="text" value={newContractName} onChange={e => setNewContractName(e.target.value)} placeholder="Contract name" autoFocus />
            </div>
            <div className="btn-row">
              <button className="btn btn-ghost" onClick={() => setShowAddContract(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={createContract}>Create</button>
            </div>
          </div>
        </div>
      )}

      {showAdjustments && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setShowAdjustments(false); }}>
          <div className="modal">
            <h2>Employer adjustments · {viewYear}</h2>
            <p className="desc">For days your boss counts differently than you do — add the gap here instead of tapping a specific date. This directly changes your days-worked total above. Positive numbers add days, negative numbers subtract.</p>

            {activeContractAdjustments.length === 0 && <div className="notes-empty">No adjustments logged for {viewYear} yet.</div>}
            {activeContractAdjustments.map(a => (
              <div className="manage-contract-row" key={a.id}>
                <input type="text" readOnly value={(a.amount > 0 ? '+' : '') + a.amount + ' days' + (a.note ? ' — ' + a.note : '')} />
                <button onClick={() => removeAdjustment(a.id)}>Remove</button>
              </div>
            ))}

            <hr className="divider" />
            <div className="field">
              <label>Amount (days)</label>
              <input type="number" inputMode="decimal" step="0.5" placeholder="e.g. 1.5 or -0.5" value={newAdjAmount}
                onChange={e => setNewAdjAmount(e.target.value)} />
            </div>
            <div className="field">
              <label>Note (optional)</label>
              <input type="text" placeholder="e.g. Boss counted 6/12 travel as full" value={newAdjNote}
                onChange={e => setNewAdjNote(e.target.value)} />
            </div>
            <div className="btn-row">
              <button className="btn btn-ghost" onClick={() => setShowAdjustments(false)}>Close</button>
              <button className="btn btn-primary" onClick={addAdjustment}>Add adjustment</button>
            </div>

            {activeContractAdjustments.length > 0 && (
              <React.Fragment>
                <hr className="divider" />
                <div className="earnings-panel">
                  <span>Adjustment total</span><b>{adjustmentTotal > 0 ? '+' : ''}{adjustmentTotal.toFixed(1)} days</b>
                </div>
                <div className="earnings-panel">
                  <span>Your days worked (with adjustment)</span><b>{totals.total.toFixed(1)}</b>
                </div>
              </React.Fragment>
            )}
          </div>
        </div>
      )}

      {showSettings && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setShowSettings(false); }}>
          <div className="modal">
            <h2>{contracts[activeContractId]?.name} · {editingSettingsYear}</h2>
            <p className="desc">These rates apply to this contract for {editingSettingsYear} only. New years start from your most recent year's numbers until you change them.</p>
            <div className="field">
              <label>Contract days per year</label>
              <input type="number" inputMode="decimal" value={settingsDraft.contractDays}
                onChange={e => setSettingsDraft(s => ({ ...s, contractDays: e.target.value }))} />
            </div>
            <div className="field">
              <label>Annual salary (optional)</label>
              <input type="number" inputMode="decimal" placeholder="e.g. 175000" value={settingsDraft.annualSalary}
                onChange={e => setSettingsDraft(s => ({ ...s, annualSalary: e.target.value }))} />
            </div>
            <div className="field">
              <label>Overtime multiplier (optional)</label>
              <input type="number" inputMode="decimal" step="0.1" placeholder="e.g. 1.5" value={settingsDraft.otMultiplier}
                onChange={e => setSettingsDraft(s => ({ ...s, otMultiplier: e.target.value }))} />
            </div>
            <div className="field">
              <label>Starting balance for {editingSettingsYear} (optional)</label>
              <input type="number" inputMode="decimal" step="0.5" placeholder="Days already worked before tracking" value={settingsDraft.startingBalance}
                onChange={e => setSettingsDraft(s => ({ ...s, startingBalance: e.target.value }))} />
            </div>
            <div className="field">
              <label>As of date (optional)</label>
              <input type="date" value={settingsDraft.startingBalanceDate}
                onChange={e => setSettingsDraft(s => ({ ...s, startingBalanceDate: e.target.value }))} />
              <div style={{fontSize: 11, color: 'var(--text-muted)', marginTop: 6}}>Dates on or before this are locked on the calendar so they can't get double-counted.</div>
            </div>
            <div className="btn-row">
              <button className="btn btn-ghost" onClick={() => setShowSettings(false)}>Cancel</button>
              <button className="btn btn-primary" onClick={saveSettings}>Save</button>
            </div>

            <hr className="divider" />
            <h3>Contracts</h3>
            {contractList.map(c => (
              <div className={"manage-contract-row" + (c.archived ? " archived" : "")} key={c.id}>
                <input type="text" value={c.name} onChange={e => renameContract(c.id, e.target.value)} />
                <button onClick={() => toggleArchiveContract(c.id)}>{c.archived ? 'Unarchive' : 'Archive'}</button>
              </div>
            ))}
            <button className="btn btn-ghost" style={{width: '100%', marginTop: 4}} onClick={() => { setShowSettings(false); setShowAddContract(true); }}>+ Add another contract</button>

            <hr className="divider" />
            <h3>Backup</h3>
            <p className="desc">Your data lives only on this device. Export it periodically so you don't lose it.</p>
            <div className="data-actions">
              <button className="btn btn-ghost" onClick={exportData}>Export data</button>
              <button className="btn btn-ghost" onClick={() => fileInputRef.current.click()}>Import data</button>
              <input ref={fileInputRef} type="file" accept=".json,application/json" style={{ display: 'none' }}
                onChange={(e) => { if (e.target.files[0]) importData(e.target.files[0]); e.target.value = ''; }} />
            </div>
          </div>
        </div>
      )}

      {showSummary && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setShowSummary(false); }}>
          <div className="modal">
            <h2>Year summary</h2>
            <p className="desc">Total days logged against each contract's own terms.</p>
            {yearSummaries.map(cs => (
              <div className="summary-contract-block" key={cs.contractId}>
                <h3>{cs.name}{cs.archived ? ' (archived)' : ''}</h3>
                {cs.rows.map(y => (
                  <div className="summary-row" key={y.year}>
                    <div className="summary-year" onClick={() => { setShowSummary(false); switchContract(cs.contractId); openSettingsFor(y.year, cs.contractId); }} style={{cursor: 'pointer'}}>{y.year}</div>
                    <div className={"summary-stats" + (y.over ? " over" : "")}>
                      <b>{y.total.toFixed(1)}</b> / {y.contractDays} days
                      {y.over && <div>over by {(y.total - y.contractDays).toFixed(1)}</div>}
                    </div>
                  </div>
                ))}
              </div>
            ))}

            <hr className="divider" />
            <h3>Notes · {contracts[activeContractId]?.name} · {viewYear}</h3>
            {notesForYear.length === 0 && <div className="notes-empty">No notes logged for {viewYear} yet.</div>}
            {notesForYear.map(n => (
              <div className="notes-list-item" key={n.iso}>
                <div className="notes-list-date">
                  <span>{friendlyDate(n.iso)}</span>
                  <span style={{textTransform: 'capitalize'}}>{n.status}</span>
                </div>
                <div className="notes-list-text">{n.note}</div>
              </div>
            ))}

            <div className="btn-row">
              <button className="btn btn-primary" onClick={() => setShowSummary(false)}>Close</button>
            </div>
          </div>
        </div>
      )}

      {dayDetailIso && (
        <div className="modal-backdrop" onClick={(e) => { if (e.target === e.currentTarget) setDayDetailIso(null); }}>
          <div className="modal">
            <h2>{friendlyDate(dayDetailIso)}</h2>
            <p className="desc">Set the day type and add an optional note for {contracts[activeContractId]?.name}.</p>
            <div className="day-detail">
              <button className={detailEntry?.status === 'full' ? 'active-full' : ''} onClick={() => setDayStatus(dayDetailIso, detailEntry?.status === 'full' ? null : 'full')}>Full</button>
              <button className={detailEntry?.status === 'half' ? 'active-half' : ''} onClick={() => setDayStatus(dayDetailIso, detailEntry?.status === 'half' ? null : 'half')}>Half</button>
              <button className={detailEntry?.status === 'quarter' ? 'active-quarter' : ''} onClick={() => setDayStatus(dayDetailIso, detailEntry?.status === 'quarter' ? null : 'quarter')}>Quarter</button>
            </div>
            <div className="field">
              <label>Note</label>
              <textarea value={detailNoteDraft} onChange={(e) => setDetailNoteDraft(e.target.value)} placeholder="e.g. Arirang EU leg, load-in"></textarea>
            </div>
            <div className="btn-row">
              <button className="btn btn-ghost" onClick={() => setDayDetailIso(null)}>Cancel</button>
              <button className="btn btn-primary" onClick={() => { setDayNote(dayDetailIso, detailNoteDraft); setDayDetailIso(null); }}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
