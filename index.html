<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#17171a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Days Worked</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<style>
  :root{
    --bg: #17171a;
    --panel: #202024;
    --panel-raised: #26262b;
    --border: #38383d;
    --text: #f2efe9;
    --text-muted: #9c9ca2;
    --full: #e8b84b;
    --full-dim: #4a3f22;
    --half: #6fa0c9;
    --half-dim: #23384a;
    --quarter: #c97c4b;
    --quarter-dim: #3f2a1c;
    --danger: #c96b6b;
    --danger-dim: #3f2323;
  }

  :root.light-theme {
    --bg: #f7f5f0;
    --panel: #ffffff;
    --panel-raised: #efece4;
    --border: #ddd6c9;
    --text: #201f1c;
    --text-muted: #6b6862;
    --full: #c8900f;
    --full-dim: #faecc8;
    --half: #2f72b0;
    --half-dim: #dceaf6;
    --quarter: #bb6a24;
    --quarter-dim: #f7e3d1;
    --danger: #c1484a;
    --danger-dim: #fbe2e2;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); }

  #root {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  .wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px 48px; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .brand {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    letter-spacing: 0.06em;
    font-size: 20px;
    text-transform: uppercase;
  }
  .brand .dot { color: var(--full); }
  .header-icons { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted);
    cursor: pointer;
  }
  .icon-btn:active { background: var(--panel-raised); }

  /* Tour pills */
  .pill-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 6px;
    scrollbar-width: none;
  }
  .pill-row::-webkit-scrollbar { display: none; }
  .pill {
    flex: 0 0 auto;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .pill.active { background: var(--full); color: #1a1408; border-color: var(--full); }
  .pill.add { color: var(--full); border-style: dashed; }

  .pill-hint {
    font-size: 12px; color: var(--text-muted); margin: -2px 0 14px 2px;
  }

  /* Nudge banner */
  .nudge {
    background: var(--half-dim);
    border: 1px solid var(--half);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    font-size: 13px;
  }
  .nudge-text { color: var(--text); flex: 1; }
  .nudge-actions { display: flex; gap: 6px; }
  .nudge-btn {
    background: var(--half);
    color: #0d1c28;
    border: none;
    border-radius: 7px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  .nudge-x {
    background: none; border: none; color: var(--text-muted);
    font-size: 16px; cursor: pointer; padding: 2px 6px;
  }
  .nudge.backup-nudge {
    background: var(--full-dim); border-color: var(--full);
  }
  .nudge.backup-nudge .nudge-btn {
    background: var(--full); color: #1a1408;
  }

  /* Today card */
  .today-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .today-card-head {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 10px;
  }
  .today-label {
    font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .today-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
  }
  .also-logged {
    font-size: 11px; color: var(--half); margin-top: 8px;
  }

  /* Stat panel */
  .stat-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 18px 16px;
    margin-bottom: 8px;
    position: relative;
    overflow: hidden;
  }
  .stat-panel::before {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--full);
  }
  .stat-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .stat-main {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 34px;
    line-height: 1;
  }
  .stat-main .of {
    font-size: 16px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .stat-label {
    font-size: 12px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .stat-sub {
    text-align: right;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
  }
  .stat-sub b { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .progress-track {
    margin-top: 14px;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--full), #f2cd6e);
    border-radius: 3px;
    transition: width .3s ease;
  }
  .progress-fill.over { background: linear-gradient(90deg, var(--danger), #e08a8a); }

  /* Month nav */
  .month-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin: 22px 0 2px;
  }
  .month-title {
    font-family: 'Oswald', sans-serif;
    font-size: 18px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }
  .nav-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 20px; cursor: pointer; padding: 4px 10px;
  }
  .nav-btn:active { color: var(--text); }
  .year-jump-row {
    display: flex; justify-content: center; gap: 18px; margin-bottom: 10px;
  }
  .year-jump-btn {
    background: none; border: none; color: var(--text-muted);
    font-size: 12px; padding: 2px 8px; cursor: pointer;
  }

  .weekday-row {
    display: grid; grid-template-columns: repeat(7, 1fr);
    margin-bottom: 6px;
  }
  .weekday-row span {
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    cursor: pointer;
    position: relative;
    transition: transform .08s ease;
    touch-action: manipulation;
  }
  .cell.empty-cell { visibility: hidden; }
  .cell.today { box-shadow: inset 0 0 0 1.5px var(--text); }
  .cell:active { transform: scale(0.9); }

  .cell.full { background: var(--full); color: #1a1408; border-color: var(--full); font-weight: 700; }
  .cell.half { background: var(--half-dim); color: var(--half); border-color: var(--half); }
  .cell.half::after {
    content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 50%;
    background: var(--half); border-radius: 0 7px 7px 0; z-index: -1;
  }
  .cell.quarter { background: var(--quarter-dim); color: var(--quarter); border-color: var(--quarter); }
  .cell.quarter::after {
    content: ""; position: absolute; right: 0; top: 0; bottom: 0; width: 25%;
    background: var(--quarter); border-radius: 0 7px 7px 0; z-index: -1;
  }
  .cell.future { opacity: 0.45; }
  .cell.locked {
    cursor: default;
    opacity: 0.35;
    background: repeating-linear-gradient(45deg, var(--panel), var(--panel) 4px, var(--panel-raised) 4px, var(--panel-raised) 8px);
  }
  .cell .note-dot {
    position: absolute; top: 3px; right: 3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: currentColor; opacity: 0.7;
  }
  .cell .stack-badge {
    position: absolute; top: 2px; left: 2px;
    font-size: 8px; font-weight: 800; line-height: 1;
    color: currentColor;
    background: rgba(0,0,0,0.22);
    padding: 1px 3px;
    border-radius: 4px;
  }

  .legend {
    display: flex; gap: 14px; margin-top: 16px; flex-wrap: wrap;
    font-size: 11px; color: var(--text-muted);
  }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .swatch { width: 10px; height: 10px; border-radius: 3px; display: inline-block; }

  .hint {
    text-align: center; font-size: 12px; color: var(--text-muted);
    margin-top: 18px; line-height: 1.6;
  }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 50;
  }
  .modal {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    width: 100%; max-width: 480px;
    padding: 24px 20px 28px;
    animation: slideup .25s ease;
    max-height: 85vh;
    overflow-y: auto;
  }
  @keyframes slideup { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .modal h2 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    font-size: 18px;
    margin: 0 0 4px;
  }
  .modal h3 {
    font-family: 'Oswald', sans-serif;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    font-size: 14px;
    margin: 0 0 8px;
    color: var(--text-muted);
  }
  .modal p.desc { color: var(--text-muted); font-size: 12px; margin: 0 0 18px; }
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 6px;
  }
  .field input, .field textarea {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 12px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 15px;
  }
  .field textarea { font-family: 'Inter', sans-serif; font-size: 14px; resize: vertical; min-height: 50px; }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--full); }
  .btn-row { display: flex; gap: 10px; margin-top: 18px; }
  .btn {
    flex: 1; padding: 13px; border-radius: 10px; border: none;
    font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px;
    cursor: pointer;
  }
  .btn-primary { background: var(--full); color: #1a1408; }
  .btn-primary:active { background: #d1a53f; }
  .btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .advanced-toggle {
    font-size: 12px; color: var(--half); cursor: pointer; margin: -4px 0 16px; font-weight: 600;
  }

  .day-detail { display: flex; gap: 8px; margin-top: 4px; margin-bottom: 14px; }
  .day-detail button {
    flex: 1; padding: 12px 4px; border-radius: 9px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-size: 12px; font-weight: 600;
    cursor: pointer; font-family: 'Inter', sans-serif;
  }
  .day-detail button.active-full { background: var(--full); color: #1a1408; border-color: var(--full); }
  .day-detail button.active-half { background: var(--half); color: #0d1c28; border-color: var(--half); }
  .day-detail button.active-quarter { background: var(--quarter); color: #241408; border-color: var(--quarter); }

  .tour-chip-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .tour-chip {
    padding: 6px 12px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text-muted); font-size: 11px; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  .tour-chip.active { background: var(--half); color: #0d1c28; border-color: var(--half); }

  .entry-block {
    background: var(--bg); border: 1px solid var(--border); border-radius: 12px;
    padding: 12px; margin-bottom: 10px;
  }
  .entry-block-head {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .entry-block-title { font-size: 12px; font-weight: 700; color: var(--text); }
  .entry-block-remove {
    background: none; border: none; color: var(--danger); font-size: 12px; cursor: pointer; padding: 2px 6px;
  }
  .day-total-line {
    font-size: 12px; color: var(--text-muted); margin: -8px 0 14px;
  }
  .day-total-line b { color: var(--text); font-family: 'JetBrains Mono', monospace; }

  .money-group {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }
  .earnings-panel {
    display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted);
    padding: 4px 0;
  }
  .earnings-panel b { color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

  .summary-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .summary-row:last-child { border-bottom: none; }
  .summary-year { font-family: 'Oswald', sans-serif; font-size: 16px; letter-spacing: 0.02em; }
  .summary-stats { text-align: right; font-size: 12px; color: var(--text-muted); }
  .summary-stats b { color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .summary-stats.over b { color: var(--danger); }

  .data-actions { display: flex; gap: 10px; }
  .data-actions .btn { font-size: 13px; padding: 11px; }

  .manage-contract-row {
    display: flex; gap: 8px; align-items: center; margin-bottom: 10px;
  }
  .manage-contract-row input {
    flex: 1; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 10px; color: var(--text);
    font-family: 'Inter', sans-serif; font-size: 13px;
  }
  .manage-contract-row button {
    background: transparent; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text-muted); padding: 9px 10px; font-size: 11px; cursor: pointer; white-space: nowrap;
  }
  .manage-contract-row.archived input { opacity: 0.5; }

  .notes-list-item {
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .notes-list-item:last-child { border-bottom: none; }
  .notes-list-date {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-muted);
    display: flex; justify-content: space-between;
  }
  .notes-list-text { font-size: 13px; margin-top: 3px; }
  .notes-empty { font-size: 12px; color: var(--text-muted); padding: 8px 0; }

  .loading-msg { text-align: center; color: var(--text-muted); padding: 60px 0; font-size: 13px; }
  .undo-toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--panel-raised);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 60;
    max-width: 90vw;
    animation: toastup .2s ease;
  }
  @keyframes toastup { from { transform: translateX(-50%) translateY(10px); opacity: 0; } to { transform: translateX(-50%) translateY(0); opacity: 1; } }
  .undo-toast button {
    background: var(--full); color: #1a1408; border: none; border-radius: 7px;
    padding: 6px 12px; font-size: 12px; font-weight: 700; cursor: pointer; white-space: nowrap;
  }
  .storage-warning {
    background: var(--danger-dim); border: 1px solid var(--danger);
    border-radius: 10px; padding: 12px 14px; font-size: 12px; margin-bottom: 14px; line-height: 1.5;
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const WEEKDAYS = ['S','M','T','W','T','F','S'];
const STATUS_CYCLE = [null, 'full', 'half', 'quarter'];
const STATUS_VALUE = { full: 1, half: 0.5, quarter: 0.25 };
const STORAGE_KEY = 'daysWorkedTrackerData';
const META_KEY = 'daysWorkedTrackerMeta';
const THEME_KEY = 'daysWorkedTrackerTheme';
const LONG_PRESS_MS = 450;
const MOVE_CANCEL_PX = 10;
const NONE_KEY = '__none__';

function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isoOf(year, month, day) {
  return year + '-' + String(month+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
}
function addDaysISO(iso, delta) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d + delta);
  return isoOf(dt.getFullYear(), dt.getMonth(), dt.getDate());
}
function friendlyDate(iso) {
  const [y,m,d] = iso.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}
function makeId() {
  return 'id_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function dayTotal(dayObj) {
  if (!dayObj) return 0;
  return Object.values(dayObj).reduce((s, e) => s + (STATUS_VALUE[e.status] || 0), 0);
}

function storageAvailable() {
  try {
    const k = '__tracker_test__';
    localStorage.setItem(k, '1');
    localStorage.removeItem(k);
    return true;
  } catch (e) {
    return false;
  }
}

function effectiveSettingsFor(yearSettings, year) {
  if (!yearSettings) return null;
  if (yearSettings[year]) return { data: yearSettings[year], sourceYear: year };
  const configuredYears = Object.keys(yearSettings).map(Number);
  if (!configuredYears.length) return null;
  const priorYears = configuredYears.filter(y => y <= year).sort((a,b) => b - a);
  if (priorYears.length) return { data: yearSettings[priorYears[0]], sourceYear: priorYears[0] };
  const nextYears = configuredYears.sort((a,b) => a - b);
  return { data: yearSettings[nextYears[0]], sourceYear: nextYears[0] };
}

// Normalizes any older single-entry-per-day shape ({status, note, tour}) into the
// current stackable shape ({ [tourKey]: {status, note} }), so a day can hold credit
// from more than one tour.
function normalizeEntries(rawEntries) {
  const out = {};
  Object.entries(rawEntries || {}).forEach(([iso, dayVal]) => {
    if (dayVal && typeof dayVal === 'object' && 'status' in dayVal) {
      const key = dayVal.tour || NONE_KEY;
      out[iso] = { [key]: { status: dayVal.status, note: dayVal.note } };
    } else if (dayVal && typeof dayVal === 'object') {
      out[iso] = dayVal;
    }
  });
  return out;
}

function migrateContractsToShared(parsed) {
  const contracts = parsed.contracts || {};
  const yearSettingsByContract = parsed.yearSettings || {};
  const entriesByContract = parsed.entries || {};
  const adjustmentsByContract = parsed.adjustments || {};
  const lastActive = parsed.lastActiveContract;

  const tours = {};
  const mergedEntries = {};
  const mergedAdjustments = {};
  const contractIds = Object.keys(contracts);
  const baseId = (lastActive && contracts[lastActive]) ? lastActive : contractIds[0];
  const mergedYearSettings = baseId ? (yearSettingsByContract[baseId] || {}) : {};

  contractIds.forEach(cId => {
    tours[cId] = { name: contracts[cId].name, archived: !!contracts[cId].archived };
    const cEntries = entriesByContract[cId] || {};
    Object.entries(cEntries).forEach(([iso, e]) => {
      const key = cId;
      if (!mergedEntries[iso]) mergedEntries[iso] = {};
      if (!mergedEntries[iso][key]) mergedEntries[iso][key] = { status: e.status, note: e.note };
    });
    const cAdjByYear = adjustmentsByContract[cId] || {};
    Object.entries(cAdjByYear).forEach(([year, list]) => {
      if (!mergedAdjustments[year]) mergedAdjustments[year] = [];
      mergedAdjustments[year] = mergedAdjustments[year].concat(
        (list || []).map(a => ({ ...a, note: (a.note ? a.note + ' ' : '') + '(' + (contracts[cId].name || 'contract') + ')' }))
      );
    });
  });

  return {
    tours,
    yearSettings: mergedYearSettings,
    entries: mergedEntries,
    adjustments: mergedAdjustments,
    activeTour: (lastActive && tours[lastActive]) ? lastActive : (contractIds[0] || null)
  };
}

function loadData() {
  const empty = { tours: {}, yearSettings: {}, entries: {}, adjustments: {}, activeTour: null };
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return empty;
    const parsed = JSON.parse(raw);
    let result;

    if (parsed.tours) {
      result = {
        tours: parsed.tours || {},
        yearSettings: parsed.yearSettings || {},
        entries: parsed.entries || {},
        adjustments: parsed.adjustments || {},
        activeTour: parsed.activeTour || Object.keys(parsed.tours || {})[0] || null
      };
    } else if (parsed.contracts) {
      result = migrateContractsToShared(parsed);
    } else if (parsed.yearSettings || parsed.entries) {
      const hasAny = (parsed.yearSettings && Object.keys(parsed.yearSettings).length) || (parsed.entries && Object.keys(parsed.entries).length);
      result = hasAny ? { tours: {}, yearSettings: parsed.yearSettings || {}, entries: parsed.entries || {}, adjustments: {}, activeTour: null } : empty;
    } else if (parsed.settings && parsed.settings.contractDays != null) {
      result = { tours: {}, yearSettings: { [new Date().getFullYear()]: parsed.settings }, entries: parsed.entries || {}, adjustments: {}, activeTour: null };
    } else {
      result = empty;
    }
    result.entries = normalizeEntries(result.entries);
    return result;
  } catch (e) {
    return empty;
  }
}
function saveData(tours, yearSettings, entries, adjustments, activeTour) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tours, yearSettings, entries, adjustments, activeTour }));
    return true;
  } catch (e) {
    return false;
  }
}
function loadMeta() {
  try {
    const raw = localStorage.getItem(META_KEY);
    if (!raw) return { installedAt: null, lastExportAt: null };
    return JSON.parse(raw);
  } catch (e) {
    return { installedAt: null, lastExportAt: null };
  }
}
function saveMeta(meta) {
  try { localStorage.setItem(META_KEY, JSON.stringify(meta)); } catch (e) {}
}

function App() {
  const hasStorage = useMemo(() => storageAvailable(), []);
  const initial = useMemo(() => hasStorage ? loadData() : { tours: {}, yearSettings: {}, entries: {}, adjustments: {}, activeTour: null }, [hasStorage]);

  const [tours, setTours] = useState(initial.tours);
  const [yearSettings, setYearSettings] = useState(initial.yearSettings);
  const [entries, setEntries] = useState(initial.entries); // { iso: { [tourKey]: {status, note} } }
  const [adjustments, setAdjustments] = useState(initial.adjustments);
  const [activeTour, setActiveTour] = useState(initial.activeTour);

  const [meta, setMeta] = useState(() => {
    if (!hasStorage) return { installedAt: null, lastExportAt: null };
    const m = loadMeta();
    if (!m.installedAt) { m.installedAt = Date.now(); saveMeta(m); }
    return m;
  });
  const [backupNudgeDismissed, setBackupNudgeDismissed] = useState(false);

  const [viewYear, setViewYear] = useState(new Date().getFullYear());
  const [viewMonth, setViewMonth] = useState(new Date().getMonth());
  const [showSettings, setShowSettings] = useState(false);
  const [showAdvancedSettings, setShowAdvancedSettings] = useState(false);
  const [showToursSection, setShowToursSection] = useState(false);
  const [showBackupSection, setShowBackupSection] = useState(false);
  const [editingSettingsYear, setEditingSettingsYear] = useState(new Date().getFullYear());
  const [showSummary, setShowSummary] = useState(false);
  const [hideMoney, setHideMoney] = useState(false);
  const [theme, setTheme] = useState(() => {
    try {
      const saved = localStorage.getItem(THEME_KEY);
      if (saved === 'light' || saved === 'dark') return saved;
    } catch (e) {}
    return (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
  });
  useEffect(() => {
    document.documentElement.classList.toggle('light-theme', theme === 'light');
    try { localStorage.setItem(THEME_KEY, theme); } catch (e) {}
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute('content', theme === 'light' ? '#f7f5f0' : '#17171a');
  }, [theme]);
  const [showAddTour, setShowAddTour] = useState(false);
  const [showAdjustments, setShowAdjustments] = useState(false);
  const [newTourName, setNewTourName] = useState('');
  const [dayDetailIso, setDayDetailIso] = useState(null);
  const [nudgeDismissed, setNudgeDismissed] = useState(false);
  const [settingsDraft, setSettingsDraft] = useState({ contractDays: '245', annualSalary: '', standardDays: '', startingBalance: '', startingBalanceDate: '', startingBalanceTour: '' });
  const fileInputRef = useRef(null);
  const pressState = useRef({});
  const swipeRef = useRef({ x: 0, y: 0, active: false });

  const persist = useCallback((nt, nys, ne, nAdj, nActiveTour) => {
    saveData(nt, nys, ne, nAdj, nActiveTour);
  }, []);

  const [lastChange, setLastChange] = useState(null);

  // Updates a single tour's entry for a given date, without touching other tours' entries on that date.
  const updateDayTourEntry = (iso, tourKey, patch, recordUndo) => {
    const priorDay = entries[iso] || {};
    const priorEntry = priorDay[tourKey] || {};
    setEntries(prev => {
      const day = { ...(prev[iso] || {}) };
      const merged = { ...(day[tourKey] || {}), ...patch };
      if (!merged.status) {
        delete day[tourKey];
      } else {
        day[tourKey] = merged;
      }
      const updated = { ...prev };
      if (Object.keys(day).length === 0) delete updated[iso]; else updated[iso] = day;
      persist(tours, yearSettings, updated, adjustments, activeTour);
      return updated;
    });
    if (recordUndo && 'status' in patch) {
      setLastChange({ iso, tourKey, prevStatus: priorEntry.status || null, prevNote: priorEntry.note, newStatus: patch.status, ts: Date.now() });
    }
  };

  const undoLastChange = () => {
    if (!lastChange) return;
    const { iso, tourKey, prevStatus, prevNote } = lastChange;
    setEntries(prev => {
      const day = { ...(prev[iso] || {}) };
      if (prevStatus) {
        day[tourKey] = { status: prevStatus, note: prevNote };
      } else {
        delete day[tourKey];
      }
      const updated = { ...prev };
      if (Object.keys(day).length === 0) delete updated[iso]; else updated[iso] = day;
      persist(tours, yearSettings, updated, adjustments, activeTour);
      return updated;
    });
    setLastChange(null);
  };

  useEffect(() => {
    if (!lastChange) return;
    const t = setTimeout(() => setLastChange(null), 6000);
    return () => clearTimeout(t);
  }, [lastChange]);

  const hapticTap = () => {
    if (navigator.vibrate) { try { navigator.vibrate(8); } catch (e) {} }
  };

  const activeKey = activeTour || NONE_KEY;
  const canLog = !!activeTour;

  const cycleDay = (iso) => {
    if (!canLog) return;
    const current = entries[iso]?.[activeKey]?.status || null;
    const idx = STATUS_CYCLE.indexOf(current);
    const next = STATUS_CYCLE[(idx + 1) % STATUS_CYCLE.length];
    updateDayTourEntry(iso, activeKey, { status: next }, true);
    hapticTap();
  };
  const setTodayStatus = (status) => {
    if (!canLog) return;
    updateDayTourEntry(todayISO(), activeKey, { status }, true);
    hapticTap();
  };
  const setEntryStatus = (iso, tourKey, status) => {
    updateDayTourEntry(iso, tourKey, { status }, true);
    hapticTap();
  };
  const setEntryNote = (iso, tourKey, note) => updateDayTourEntry(iso, tourKey, { note });
  const removeEntry = (iso, tourKey) => updateDayTourEntry(iso, tourKey, { status: null });
  const addEntryForTour = (iso, tourKey) => updateDayTourEntry(iso, tourKey, { status: 'full' }, true);

  const switchActiveTour = (id) => {
    setActiveTour(id);
    persist(tours, yearSettings, entries, adjustments, id);
  };

  const createTour = () => {
    const name = newTourName.trim() || ('Tour ' + (Object.keys(tours).length + 1));
    const id = makeId();
    const nextTours = { ...tours, [id]: { name, archived: false } };
    setTours(nextTours);
    setActiveTour(id);
    persist(nextTours, yearSettings, entries, adjustments, id);
    setShowAddTour(false);
    setNewTourName('');
  };

  const renameTour = (id, name) => {
    const nextTours = { ...tours, [id]: { ...tours[id], name } };
    setTours(nextTours);
    persist(nextTours, yearSettings, entries, adjustments, activeTour);
  };

  // If the active tour goes away (archived/deleted), prefer switching to another
  // remaining visible tour over dropping all the way to "No tag".
  const pickFallbackTour = (toursObj, excludeId) => {
    const remaining = Object.entries(toursObj).filter(([tid, t]) => tid !== excludeId && !t.archived);
    return remaining.length ? remaining[0][0] : null;
  };

  const toggleArchiveTour = (id) => {
    const willBeArchived = !tours[id].archived;
    const nextTours = { ...tours, [id]: { ...tours[id], archived: willBeArchived } };
    const nextActiveTour = (willBeArchived && activeTour === id) ? pickFallbackTour(nextTours, id) : activeTour;
    setTours(nextTours);
    setActiveTour(nextActiveTour);
    persist(nextTours, yearSettings, entries, adjustments, nextActiveTour);
  };

  const deleteTour = (id) => {
    const name = tours[id]?.name || 'this tour';
    let affectedDays = 0;
    let affectedTotal = 0;
    Object.values(entries).forEach(dayObj => {
      if (dayObj[id]) {
        affectedDays += 1;
        affectedTotal += STATUS_VALUE[dayObj[id].status] || 0;
      }
    });
    const warning = affectedDays > 0
      ? `Delete "${name}"? This removes ${affectedDays} logged day${affectedDays === 1 ? '' : 's'} tagged to it (${affectedTotal.toFixed(1)} days total) — your day count will drop by that much. This can't be undone.`
      : `Delete "${name}"? This can't be undone.`;
    const ok = window.confirm(warning);
    if (!ok) return;

    const nextTours = { ...tours };
    delete nextTours[id];

    const nextEntries = {};
    Object.entries(entries).forEach(([iso, dayObj]) => {
      if (!(id in dayObj)) { nextEntries[iso] = dayObj; return; }
      const day = { ...dayObj };
      delete day[id];
      if (Object.keys(day).length > 0) nextEntries[iso] = day;
      // if the day has no other tour's entry left, it's dropped entirely
    });

    const nextActiveTour = activeTour === id ? pickFallbackTour(nextTours, id) : activeTour;
    setTours(nextTours);
    setEntries(nextEntries);
    setActiveTour(nextActiveTour);
    persist(nextTours, yearSettings, nextEntries, adjustments, nextActiveTour);
  };

  const openSettingsFor = (year) => {
    setEditingSettingsYear(year);
    const eff = effectiveSettingsFor(yearSettings, year);
    const balVal = yearSettings[year]?.startingBalance;
    const stdVal = eff?.data?.standardDays;
    setSettingsDraft({
      contractDays: String(eff?.data?.contractDays ?? 245),
      annualSalary: eff?.data?.annualSalary != null ? String(eff.data.annualSalary) : '',
      standardDays: stdVal != null ? String(stdVal) : '',
      startingBalance: balVal != null ? String(balVal) : '',
      startingBalanceDate: yearSettings[year]?.startingBalanceDate || '',
      startingBalanceTour: yearSettings[year]?.startingBalanceTour || ''
    });
    setShowAdvancedSettings(!!balVal || !!stdVal);
    setShowSettings(true);
  };

  const saveSettings = () => {
    const cdParsed = parseFloat(settingsDraft.contractDays);
    const cd = isNaN(cdParsed) ? 245 : cdParsed;
    const sal = settingsDraft.annualSalary.trim() === '' ? null : parseFloat(settingsDraft.annualSalary);
    const stdParsed = parseFloat(settingsDraft.standardDays);
    const std = settingsDraft.standardDays.trim() === '' || isNaN(stdParsed) ? null : stdParsed;
    const bal = settingsDraft.startingBalance.trim() === '' ? 0 : (parseFloat(settingsDraft.startingBalance) || 0);
    const balDate = settingsDraft.startingBalanceDate || null;
    const balTour = settingsDraft.startingBalanceTour || null;
    const next = { ...yearSettings, [editingSettingsYear]: { contractDays: cd, annualSalary: sal, standardDays: std, startingBalance: bal, startingBalanceDate: balDate, startingBalanceTour: balTour } };
    setYearSettings(next);
    persist(tours, next, entries, adjustments, activeTour);
    setShowSettings(false);
  };

  const [newAdjAmount, setNewAdjAmount] = useState('');
  const [newAdjNote, setNewAdjNote] = useState('');
  const yearAdjustments = adjustments[viewYear] || [];

  const addAdjustment = () => {
    const amt = parseFloat(newAdjAmount);
    if (!amt) return;
    const yearList = [...(adjustments[viewYear] || [])];
    yearList.push({ id: makeId(), amount: amt, note: newAdjNote.trim() });
    const next = { ...adjustments, [viewYear]: yearList };
    setAdjustments(next);
    persist(tours, yearSettings, entries, next, activeTour);
    setNewAdjAmount('');
    setNewAdjNote('');
  };
  const removeAdjustment = (id) => {
    const yearList = (adjustments[viewYear] || []).filter(a => a.id !== id);
    const next = { ...adjustments, [viewYear]: yearList };
    setAdjustments(next);
    persist(tours, yearSettings, entries, next, activeTour);
  };

  const exportData = () => {
    const payload = JSON.stringify({ tours, yearSettings, entries, adjustments, activeTour }, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'days-worked-backup-' + todayISO() + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    const nextMeta = { ...meta, lastExportAt: Date.now() };
    setMeta(nextMeta);
    saveMeta(nextMeta);
    setBackupNudgeDismissed(true);
  };

  const importData = (file) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const parsed = JSON.parse(e.target.result);
        const nt = parsed.tours || {};
        const nys = parsed.yearSettings || {};
        const ne = normalizeEntries(parsed.entries || {});
        const nAdj = parsed.adjustments || {};
        const nActive = parsed.activeTour || Object.keys(nt)[0] || null;
        setTours(nt); setYearSettings(nys); setEntries(ne); setAdjustments(nAdj); setActiveTour(nActive);
        persist(nt, nys, ne, nAdj, nActive);
        alert('Backup imported.');
      } catch (err) {
        alert('That file could not be read as a backup.');
      }
    };
    reader.readAsText(file);
  };

  const effSettings = useMemo(() => effectiveSettingsFor(yearSettings, viewYear), [yearSettings, viewYear]);
  const contractDays = effSettings ? effSettings.data.contractDays : 245;
  const usingFallbackYear = effSettings && effSettings.sourceYear !== viewYear ? effSettings.sourceYear : null;
  const startingBalance = yearSettings[viewYear]?.startingBalance || 0;
  const startingBalanceDate = yearSettings[viewYear]?.startingBalanceDate || null;
  const startingBalanceTour = yearSettings[viewYear]?.startingBalanceTour || null;
  const adjustmentTotal = yearAdjustments.reduce((s, a) => s + a.amount, 0);

  // Total sums every tour's entry for every date — this is where stacking happens automatically.
  const totals = useMemo(() => {
    let total = startingBalance + adjustmentTotal;
    const viewedYearPrefix = viewYear + '-';
    Object.entries(entries).forEach(([iso, dayObj]) => {
      if (startingBalanceDate && iso <= startingBalanceDate) return;
      if (iso.startsWith(viewedYearPrefix)) total += dayTotal(dayObj);
    });
    return { total };
  }, [entries, viewYear, startingBalance, startingBalanceDate, adjustmentTotal]);

  const remaining = Math.max(0, contractDays - totals.total);
  const isOver = totals.total >= contractDays;
  const pct = Math.min(100, (totals.total / contractDays) * 100);
  const payRateDays = effSettings?.data?.standardDays || contractDays;
  const dayRate = effSettings && effSettings.data.annualSalary ? effSettings.data.annualSalary / payRateDays : null;
  const extraDays = Math.max(0, totals.total - contractDays);
  const extraPay = dayRate ? extraDays * dayRate : null;

  const tourList = Object.entries(tours).map(([id, t]) => ({ id, ...t }));
  const visibleTours = tourList.filter(t => !t.archived);
  const tourName = (key) => key === NONE_KEY ? 'No tag' : (tours[key]?.name || 'Deleted tour');

  const byTourThisYear = useMemo(() => {
    const totalsByTour = {};
    const viewedYearPrefix = viewYear + '-';
    Object.entries(entries).forEach(([iso, dayObj]) => {
      if (!iso.startsWith(viewedYearPrefix)) return;
      if (startingBalanceDate && iso <= startingBalanceDate) return;
      Object.entries(dayObj).forEach(([tourKey, e]) => {
        totalsByTour[tourKey] = (totalsByTour[tourKey] || 0) + (STATUS_VALUE[e.status] || 0);
      });
    });
    if (startingBalance > 0) {
      const balKey = startingBalanceTour || '__balance__';
      totalsByTour[balKey] = (totalsByTour[balKey] || 0) + startingBalance;
    }
    return Object.entries(totalsByTour)
      .map(([tourKey, days]) => ({ tourKey, name: tourKey === '__balance__' ? 'Starting balance (unassigned)' : tourName(tourKey), days }))
      .sort((a, b) => b.days - a.days);
  }, [entries, viewYear, startingBalanceDate, startingBalance, startingBalanceTour, tours]);

  const yearSummaries = useMemo(() => {
    const years = new Set([new Date().getFullYear()]);
    Object.keys(entries).forEach(iso => years.add(parseInt(iso.slice(0,4), 10)));
    Object.keys(yearSettings).forEach(y => years.add(parseInt(y, 10)));
    Object.keys(adjustments).forEach(y => years.add(parseInt(y, 10)));
    return Array.from(years).sort((a,b) => b - a).map(y => {
      const yAdj = (adjustments[y] || []).reduce((s, a) => s + a.amount, 0);
      let t = (yearSettings[y]?.startingBalance || 0) + yAdj;
      const balDate = yearSettings[y]?.startingBalanceDate || null;
      Object.entries(entries).forEach(([iso, dayObj]) => {
        if (balDate && iso <= balDate) return;
        if (iso.startsWith(y + '-')) t += dayTotal(dayObj);
      });
      const eff = effectiveSettingsFor(yearSettings, y);
      const cd = eff ? eff.data.contractDays : 245;
      return { year: y, total: t, contractDays: cd, over: t >= cd };
    });
  }, [entries, yearSettings, adjustments]);

  const notesForYear = useMemo(() => {
    const list = [];
    Object.entries(entries).forEach(([iso, dayObj]) => {
      if (!iso.startsWith(viewYear + '-')) return;
      Object.entries(dayObj).forEach(([tourKey, e]) => {
        if (e.note) list.push({ iso, note: e.note, status: e.status, tourKey });
      });
    });
    return list.sort((a,b) => a.iso.localeCompare(b.iso));
  }, [entries, viewYear]);

  const todayIso = todayISO();
  const yesterdayIso = addDaysISO(todayIso, -1);
  const showNudge = !nudgeDismissed && !entries[yesterdayIso] && effSettings && canLog;

  const daysSinceBackup = useMemo(() => {
    const ref = meta.lastExportAt || meta.installedAt;
    if (!ref) return 0;
    return Math.floor((Date.now() - ref) / 86400000);
  }, [meta]);
  const showBackupNudge = !backupNudgeDismissed && Object.keys(entries).length > 0 && daysSinceBackup >= 14;

  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startWeekday; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const changeMonth = (delta) => {
    let m = viewMonth + delta;
    let y = viewYear;
    if (m < 0) { m = 11; y -= 1; }
    if (m > 11) { m = 0; y += 1; }
    setViewMonth(m);
    setViewYear(y);
  };
  const changeYear = (delta) => setViewYear(y => y + delta);

  const handleSwipeStart = (e) => {
    const t = e.touches ? e.touches[0] : e;
    swipeRef.current = { x: t.clientX, y: t.clientY, active: true };
  };
  const handleSwipeEnd = (e) => {
    if (!swipeRef.current.active) return;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - swipeRef.current.x;
    const dy = t.clientY - swipeRef.current.y;
    swipeRef.current.active = false;
    if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy) * 1.5) changeMonth(dx < 0 ? 1 : -1);
  };

  const handlePressStart = (iso) => (e) => {
    const t = e.touches ? e.touches[0] : e;
    pressState.current[iso] = { time: Date.now(), x: t.clientX, y: t.clientY, moved: false };
  };
  const handlePressMove = (iso) => (e) => {
    const rec = pressState.current[iso];
    if (!rec) return;
    const t = e.touches ? e.touches[0] : e;
    if (Math.abs(t.clientX - rec.x) > MOVE_CANCEL_PX || Math.abs(t.clientY - rec.y) > MOVE_CANCEL_PX) rec.moved = true;
  };
  const handlePressEnd = (iso) => (e) => {
    const rec = pressState.current[iso];
    if (!rec) return;
    delete pressState.current[iso];
    if (rec.moved) return;
    e.preventDefault();
    const elapsed = Date.now() - rec.time;
    if (elapsed >= LONG_PRESS_MS) setDayDetailIso(iso);
    else cycleDay(iso);
  };

  const needsSetup = Object.keys(yearSettings).length === 0;
  const todayDayObj = entries[todayIso] || {};
  const todayActiveEntry = todayDayObj[activeKey] || {};
  const otherTodayEntries = Object.entries(todayDayObj).filter(([k]) => k !== activeKey);

  const dayDetailObj = dayDetailIso ? (entries[dayDetailIso] || {}) : {};
  const loggedKeysForDetail = Object.keys(dayDetailObj);
  const addableTours = dayDetailIso
    ? visibleTours.filter(t => !loggedKeysForDetail.includes(t.id))
    : [];
  const [noteDrafts, setNoteDrafts] = useState({});
  useEffect(() => {
    if (dayDetailIso) {
      const drafts = {};
      Object.entries(dayDetailObj).forEach(([k, e]) => { drafts[k] = e.note || ''; });
      setNoteDrafts(drafts);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [dayDetailIso]);

  const [todayNoteDraft, setTodayNoteDraft] = useState('');
  useEffect(() => { setTodayNoteDraft(todayActiveEntry.note || ''); }, [entries, activeTour, todayIso]);

  return (
    <div className="wrap">
      {lastChange && (
        <div className="undo-toast">
          <span>{friendlyDate(lastChange.iso)} ({tourName(lastChange.tourKey)}) marked {lastChange.newStatus || 'clear'}</span>
          <button onClick={undoLastChange}>Undo</button>
        </div>
      )}
      <div className="header">
        <div className="brand">Days<span className="dot">·</span>Worked</div>
        <div className="header-icons">
          <div className="icon-btn" onClick={() => setTheme(t => t === 'light' ? 'dark' : 'light')} title={theme === 'light' ? 'Switch to dark' : 'Switch to light'}>
            {theme === 'light' ? (
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>

            <h2>{friendlyDate(dayDetailIso)}</h2>
            <p className="desc">Every tour logged for this date, and its own status and note. Add another to stack credit.</p>
            <div className="day-total-line">Total for this date: <b>{dayTotal(dayDetailObj).toFixed(2)}</b> days</div>

            {loggedKeysForDetail.length === 0 && <div className="notes-empty">Nothing logged for this date yet.</div>}
            {loggedKeysForDetail.map(key => {
              const e = dayDetailObj[key];
              return (
                <div className="entry-block" key={key}>
                  <div className="entry-block-head">
                    <span className="entry-block-title">{tourName(key)}</span>
                    <button className="entry-block-remove" onClick={() => removeEntry(dayDetailIso, key)}>Remove</button>
                  </div>
                  <div className="day-detail" style={{marginBottom: 8}}>
                    <button className={e.status === 'full' ? 'active-full' : ''} onClick={() => setEntryStatus(dayDetailIso, key, e.status === 'full' ? null : 'full')}>Full</button>
                    <button className={e.status === 'half' ? 'active-half' : ''} onClick={() => setEntryStatus(dayDetailIso, key, e.status === 'half' ? null : 'half')}>Half</button>
                    <button className={e.status === 'quarter' ? 'active-quarter' : ''} onClick={() => setEntryStatus(dayDetailIso, key, e.status === 'quarter' ? null : 'quarter')}>Quarter</button>
                  </div>
                  <input
                    type="text"
                    placeholder="Note (optional)"
                    value={noteDrafts[key] ?? ''}
                    onChange={(ev) => setNoteDrafts(d => ({ ...d, [key]: ev.target.value }))}
                    onBlur={() => setEntryNote(dayDetailIso, key, noteDrafts[key] || '')}
                    style={{ width: '100%', background: 'var(--panel)', border: '1px solid var(--border)', borderRadius: 8, padding: '9px 10px', color: 'var(--text)', fontFamily: 'Inter, sans-serif', fontSize: 13 }}
                  />
                </div>
              );
            })}

            {addableTours.length > 0 && (
              <React.Fragment>
                <div style={{fontSize: 11, color: 'var(--text-muted)', margin: '12px 0 8px', textTransform: 'uppercase', letterSpacing: '0.06em'}}>+ Also log for</div>
                <div className="tour-chip-row">
                  {addableTours.map(t => (
                    <div key={t.id} className="tour-chip" onClick={() => addEntryForTour(dayDetailIso, t.id)}>{t.name}</div>
                  ))}
                </div>
              </React.Fragment>
            )}

            <div className="btn-row">
              <button className="btn btn-primary" onClick={() => setDayDetailIso(null)}>Done</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<script>
  // Register service worker so the app keeps working without a connection after the first load
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(() => {});
    });
  }
</script>

</body>
</html>
